<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex">
  <title>Quick Post — Misskey</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@400;700;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0a0a0f;
      --surface: #111118;
      --border: #2a2a3a;
      --accent: #86b4ff;
      --accent-dim: #3a5080;
      --accent-glow: rgba(134, 180, 255, 0.15);
      --text: #e8e8f0;
      --text-muted: #6a6a88;
      --success: #7fffb2;
      --error: #ff7f7f;
      --warn: #ffd97f;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Zen Kaku Gothic New', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem 1rem 4rem;
      overflow-x: hidden;
    }

    /* Noise texture overlay */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
      opacity: 0.4;
    }

    /* ── Header ─────────────────────────────── */
    header {
      width: 100%;
      max-width: 680px;
      margin-bottom: 3rem;
      position: relative;
      z-index: 1;
    }

    .header-label {
      font-family: 'Space Mono', monospace;
      font-size: 0.65rem;
      letter-spacing: 0.2em;
      color: var(--accent);
      text-transform: uppercase;
      margin-bottom: 0.4rem;
      opacity: 0.8;
    }

    h1 {
      font-size: clamp(1.8rem, 5vw, 2.6rem);
      font-weight: 900;
      line-height: 1.05;
      letter-spacing: -0.02em;
    }

    h1 span {
      color: var(--accent);
    }

    /* ── Setup panel ─────────────────────────── */
    .panel {
      width: 100%;
      max-width: 680px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1.5rem;
      margin-bottom: 1.5rem;
      position: relative;
      z-index: 1;
    }

    .panel-title {
      font-family: 'Space Mono', monospace;
      font-size: 0.65rem;
      letter-spacing: 0.15em;
      color: var(--text-muted);
      text-transform: uppercase;
      margin-bottom: 1rem;
    }

    .field-row {
      display: flex;
      gap: 0.75rem;
      align-items: flex-end;
      flex-wrap: wrap;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
      flex: 1;
      min-width: 180px;
    }

    label {
      font-size: 0.78rem;
      color: var(--text-muted);
      font-weight: 700;
    }

    input[type="text"],
    input[type="password"],
    input[type="url"] {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 7px;
      color: var(--text);
      font-family: 'Space Mono', monospace;
      font-size: 0.82rem;
      padding: 0.6rem 0.8rem;
      width: 100%;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-glow);
    }

    .btn {
      background: var(--accent);
      color: #0a0a1a;
      border: none;
      border-radius: 7px;
      font-family: 'Zen Kaku Gothic New', sans-serif;
      font-weight: 700;
      font-size: 0.88rem;
      padding: 0.65rem 1.4rem;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.1s, box-shadow 0.2s;
      white-space: nowrap;
    }

    .btn:hover { opacity: 0.88; box-shadow: 0 0 16px var(--accent-glow); }
    .btn:active { transform: scale(0.97); }
    .btn:disabled { opacity: 0.35; cursor: not-allowed; }

    .btn-ghost {
      background: transparent;
      color: var(--text-muted);
      border: 1px solid var(--border);
    }

    .btn-ghost:hover { color: var(--text); border-color: var(--accent); box-shadow: none; }

    /* ── Status bar ─────────────────────────── */
    .status-bar {
      width: 100%;
      max-width: 680px;
      z-index: 1;
      position: relative;
      margin-bottom: 1.5rem;
      font-family: 'Space Mono', monospace;
      font-size: 0.75rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      min-height: 1.2rem;
      transition: opacity 0.3s;
    }

    .status-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--text-muted);
      flex-shrink: 0;
    }

    .status-bar.ok .status-dot { background: var(--success); box-shadow: 0 0 6px var(--success); }
    .status-bar.err .status-dot { background: var(--error); }
    .status-bar.loading .status-dot {
      background: var(--accent);
      animation: pulse 0.8s ease-in-out infinite alternate;
    }

    @keyframes pulse { from { opacity: 0.3; } to { opacity: 1; } }

    .status-text { color: var(--text-muted); }
    .status-bar.ok .status-text { color: var(--success); }
    .status-bar.err .status-text { color: var(--error); }
    .status-bar.loading .status-text { color: var(--accent); }

    /* ── Post log ───────────────────────────── */
    .post-preview {
      width: 100%;
      max-width: 680px;
      z-index: 1;
      position: relative;
      margin-bottom: 1.5rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 0.9rem 1.1rem;
      display: none;
      animation: slideIn 0.25s ease;
    }

    .post-preview.visible { display: block; }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-6px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .post-preview-label {
      font-family: 'Space Mono', monospace;
      font-size: 0.6rem;
      letter-spacing: 0.15em;
      color: var(--text-muted);
      text-transform: uppercase;
      margin-bottom: 0.4rem;
    }

    .post-preview-text {
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--success);
    }

    /* ── Button grid ────────────────────────── */
    .buttons-section {
      width: 100%;
      max-width: 680px;
      z-index: 1;
      position: relative;
    }

    .section-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1rem;
    }

    .section-label {
      font-family: 'Space Mono', monospace;
      font-size: 0.65rem;
      letter-spacing: 0.15em;
      color: var(--text-muted);
      text-transform: uppercase;
    }

    .button-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
      gap: 0.75rem;
      margin-bottom: 2rem;
    }

    .post-btn {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-family: 'Zen Kaku Gothic New', sans-serif;
      font-size: 1rem;
      font-weight: 700;
      padding: 1.1rem 0.8rem;
      cursor: pointer;
      text-align: center;
      transition: border-color 0.15s, background 0.15s, transform 0.1s, box-shadow 0.2s;
      position: relative;
      overflow: hidden;
    }

    .post-btn::after {
      content: '';
      position: absolute;
      inset: 0;
      background: var(--accent-glow);
      opacity: 0;
      transition: opacity 0.2s;
      border-radius: 10px;
    }

    .post-btn:hover {
      border-color: var(--accent);
      box-shadow: 0 0 20px var(--accent-glow);
    }

    .post-btn:hover::after { opacity: 1; }

    .post-btn:active {
      transform: scale(0.96);
      background: var(--accent-dim);
    }

    .post-btn.posting {
      pointer-events: none;
      border-color: var(--accent);
      animation: postFlash 0.4s ease;
    }

    @keyframes postFlash {
      0% { box-shadow: 0 0 0 0 var(--accent-glow); }
      50% { box-shadow: 0 0 30px 6px var(--accent-glow); }
      100% { box-shadow: 0 0 0 0 var(--accent-glow); }
    }

    .post-btn-emoji {
      display: block;
      font-size: 1.5rem;
      margin-bottom: 0.3rem;
      line-height: 1;
    }

    .post-btn-name {
      display: block;
      font-size: 0.85rem;
    }

    /* ── Edit panel ─────────────────────────── */
    .edit-section {
      width: 100%;
      max-width: 680px;
      z-index: 1;
      position: relative;
    }

    .pattern-editor {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1.5rem;
      margin-bottom: 1rem;
    }

    .pattern-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1rem;
    }

    .pattern-name-input {
      font-size: 1rem;
      font-weight: 700;
      background: transparent;
      border: none;
      border-bottom: 2px solid var(--border);
      border-radius: 0;
      color: var(--text);
      padding: 0.2rem 0;
      width: auto;
      flex: 1;
      margin-right: 1rem;
    }

    .pattern-name-input:focus {
      border-bottom-color: var(--accent);
      box-shadow: none;
    }

    .pattern-emoji-input {
      font-size: 1.4rem;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 7px;
      padding: 0.3rem 0.5rem;
      width: 3rem;
      text-align: center;
    }

    .variants-list {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      margin-bottom: 1rem;
    }

    .variant-row {
      display: flex;
      gap: 0.5rem;
      align-items: center;
    }

    .variant-row input {
      flex: 1;
      min-width: 0;
    }

    .del-btn {
      background: transparent;
      border: 1px solid transparent;
      color: var(--text-muted);
      border-radius: 6px;
      padding: 0.4rem 0.6rem;
      cursor: pointer;
      font-size: 0.9rem;
      transition: color 0.15s, border-color 0.15s;
      flex-shrink: 0;
    }

    .del-btn:hover { color: var(--error); border-color: var(--error); }

    .add-variant-btn {
      background: transparent;
      border: 1px dashed var(--border);
      border-radius: 7px;
      color: var(--text-muted);
      font-family: 'Zen Kaku Gothic New', sans-serif;
      font-size: 0.82rem;
      padding: 0.5rem;
      cursor: pointer;
      width: 100%;
      transition: border-color 0.15s, color 0.15s;
    }

    .add-variant-btn:hover { border-color: var(--accent); color: var(--accent); }

    .remove-pattern-btn {
      background: transparent;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      font-size: 0.78rem;
      font-family: 'Space Mono', monospace;
      transition: color 0.15s;
    }

    .remove-pattern-btn:hover { color: var(--error); }

    .add-pattern-btn {
      background: transparent;
      border: 1px dashed var(--accent-dim);
      border-radius: 10px;
      color: var(--accent);
      font-family: 'Zen Kaku Gothic New', sans-serif;
      font-weight: 700;
      font-size: 0.9rem;
      padding: 1rem;
      cursor: pointer;
      width: 100%;
      transition: background 0.15s, border-color 0.15s;
      margin-bottom: 1rem;
    }

    .add-pattern-btn:hover { background: var(--accent-glow); }

    .save-bar {
      display: flex;
      gap: 0.75rem;
      justify-content: flex-end;
    }

    /* ── Visibility toggle ──────────────────── */
    .tab-row {
      display: flex;
      gap: 0;
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
      width: 100%;
      max-width: 680px;
      margin-bottom: 1.5rem;
      position: relative;
      z-index: 1;
    }

    .tab {
      flex: 1;
      background: transparent;
      border: none;
      color: var(--text-muted);
      font-family: 'Zen Kaku Gothic New', sans-serif;
      font-size: 0.85rem;
      font-weight: 700;
      padding: 0.7rem;
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
    }

    .tab.active {
      background: var(--accent);
      color: #0a0a1a;
    }

    .tab-content { display: none; width: 100%; }
    .tab-content.active { display: block; }

    /* ── Visibility selector ────────────────── */
    .vis-row {
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
      margin-top: 0.75rem;
    }

    .vis-btn {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text-muted);
      font-family: 'Space Mono', monospace;
      font-size: 0.7rem;
      padding: 0.35rem 0.75rem;
      cursor: pointer;
      transition: all 0.15s;
    }

    .vis-btn.active {
      background: var(--accent-dim);
      border-color: var(--accent);
      color: var(--accent);
    }

    /* ── Toast ──────────────────────────────── */
    #toast {
      position: fixed;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%) translateY(1rem);
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.7rem 1.2rem;
      font-family: 'Space Mono', monospace;
      font-size: 0.78rem;
      color: var(--text);
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.25s, transform 0.25s;
      z-index: 100;
      white-space: nowrap;
    }

    #toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    #toast.ok { border-color: var(--success); color: var(--success); }
    #toast.err { border-color: var(--error); color: var(--error); }
  </style>
</head>
<body>

<header>
  <div class="header-label">Misskey Quick Post</div>
  <h1>定型文<span>投稿</span></h1>
</header>

<!-- Tab switcher -->
<div class="tab-row">
  <button class="tab active" data-tab="post" onclick="switchTab('post')">投稿</button>
  <button class="tab" data-tab="settings" onclick="switchTab('settings')">設定</button>
  <button class="tab" data-tab="edit" onclick="switchTab('edit')">ボタン編集</button>
</div>

<!-- ── POST TAB ─────────────────────────────── -->
<div class="tab-content active" id="tab-post">

  <div class="status-bar" id="statusBar">
    <div class="status-dot"></div>
    <span class="status-text" id="statusText">未接続 — 設定タブでインスタンスとトークンを入力してください</span>
  </div>

  <div class="post-preview" id="postPreview">
    <div class="post-preview-label">最後に投稿したテキスト</div>
    <div class="post-preview-text" id="postPreviewText"></div>
  </div>

  <div class="buttons-section">
    <div class="section-header">
      <span class="section-label">パターンボタン</span>
    </div>
    <div class="button-grid" id="buttonGrid">
      <!-- Rendered by JS -->
    </div>
  </div>
</div>

<!-- ── SETTINGS TAB ─────────────────────────── -->
<div class="tab-content" id="tab-settings">
  <div class="panel">
    <div class="panel-title">Misskeyアカウント設定</div>
    <div class="field-row" style="flex-direction:column;">
      <div class="field" style="min-width:unset; width:100%;">
        <label>インスタンスURL</label>
        <input type="url" id="instanceUrl" placeholder="https://misskey.io" />
      </div>
      <div class="field" style="min-width:unset; width:100%;">
        <label>アクセストークン</label>
        <input type="password" id="accessToken" placeholder="トークンを貼り付けてください" />
      </div>
    </div>
    <div style="margin-top:0.75rem; display:flex; align-items:center; gap:0.5rem; flex-wrap:wrap;">
      <label style="margin:0; white-space:nowrap;">デフォルト公開範囲</label>
      <div class="vis-row" style="margin:0;">
        <button class="vis-btn active" data-vis="public" onclick="setVis(this)">🌏 パブリック</button>
        <button class="vis-btn" data-vis="home" onclick="setVis(this)">🏠 ホーム</button>
        <button class="vis-btn" data-vis="followers" onclick="setVis(this)">🔒 フォロワー</button>
      </div>
    </div>
    <div style="margin-top:1rem; display:flex; gap:0.75rem;">
      <button class="btn" onclick="saveSettings()">保存</button>
      <button class="btn btn-ghost" onclick="testConnection()">接続テスト</button>
    </div>
    <div style="margin-top:0.75rem; font-size:0.75rem; color:var(--text-muted); line-height:1.6;">
      ⚠️ トークンは <strong>ノート作成</strong> 権限のみ付与したものを推奨します。<br>
      設定はブラウザの <code>localStorage</code> に保存されます（GitHub Pages 上でも動作します）。
    </div>
  </div>
</div>

<!-- ── EDIT TAB ─────────────────────────────── -->
<div class="tab-content" id="tab-edit">
  <div class="edit-section" id="editSection">
    <!-- Rendered by JS -->
  </div>
  <button class="add-pattern-btn" onclick="addPattern()">＋ 新しいパターンを追加</button>
  <div class="save-bar">
    <button class="btn btn-ghost" onclick="resetPatterns()">リセット</button>
    <button class="btn" onclick="savePatterns()">保存して反映</button>
  </div>
</div>

<div id="toast"></div>

<script>
// ── Default patterns ──────────────────────────────────────────────
const DEFAULT_PATTERNS = [
  {
    id: 'morning',
    name: '朝',
    emoji: '🌅',
    variants: ['おはよ', 'おは', 'ぽあ', 'お', '起きた', 'おはようございます']
  },
  {
    id: 'night',
    name: '夜',
    emoji: '🌙',
    variants: ['おやすみ', 'ねむ', 'ねる', 'おやすみなさい', '就寝します']
  },
  {
    id: 'eat',
    name: '飯',
    emoji: '🍚',
    variants: ['ごはん', 'めし', 'たべる', 'ご飯食べる', 'いただきます']
  },
  {
    id: 'go',
    name: '外出',
    emoji: '🚶',
    variants: ['でかける', 'いってきます', '行ってきます', 'でかけます']
  },
  {
    id: 'back',
    name: '帰宅',
    emoji: '🏠',
    variants: ['ただいま', 'かえった', '帰宅しました', 'かえってきた']
  },
  {
    id: 'now',
    name: '起動',
    emoji: '✨',
    variants: ['います', 'いる', 'ここにいるよ', 'きた', '参上']
  }
];

// ── State ─────────────────────────────────────────────────────────
let patterns = [];
let settings = { instanceUrl: '', accessToken: '', visibility: 'public' };
let editBuffer = [];

// ── Init ──────────────────────────────────────────────────────────
(function init() {
  const saved = localStorage.getItem('qp_patterns');
  patterns = saved ? JSON.parse(saved) : DEFAULT_PATTERNS;

  const savedSettings = localStorage.getItem('qp_settings');
  if (savedSettings) {
    settings = { ...settings, ...JSON.parse(savedSettings) };
    document.getElementById('instanceUrl').value = settings.instanceUrl;
    document.getElementById('accessToken').value = settings.accessToken;
    document.querySelectorAll('.vis-btn').forEach(b => {
      b.classList.toggle('active', b.dataset.vis === settings.visibility);
    });
  }

  renderButtons();
  if (settings.accessToken && settings.instanceUrl) {
    setStatus('loading', '接続確認中…');
    testConnectionSilent();
  }
})();

// ── Tab ───────────────────────────────────────────────────────────
function switchTab(name) {
  document.querySelectorAll('.tab').forEach((t, i) => {
    const names = ['post', 'settings', 'edit'];
    t.classList.toggle('active', names[i] === name);
  });
  document.querySelectorAll('.tab-content').forEach(c => {
    c.classList.toggle('active', c.id === 'tab-' + name);
  });
  if (name === 'edit') renderEdit();
}

// ── Status ────────────────────────────────────────────────────────
function setStatus(type, text) {
  const bar = document.getElementById('statusBar');
  bar.className = 'status-bar ' + type;
  document.getElementById('statusText').textContent = text;
}

// ── Visibility ────────────────────────────────────────────────────
function setVis(btn) {
  document.querySelectorAll('.vis-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  settings.visibility = btn.dataset.vis;
}

// ── Settings ──────────────────────────────────────────────────────
function saveSettings() {
  settings.instanceUrl = document.getElementById('instanceUrl').value.replace(/\/$/, '');
  settings.accessToken = document.getElementById('accessToken').value.trim();
  localStorage.setItem('qp_settings', JSON.stringify(settings));
  toast('設定を保存しました', 'ok');
}

async function testConnection() {
  saveSettings();
  setStatus('loading', '接続確認中…');
  await testConnectionSilent(true);
}

async function testConnectionSilent(showToast = false) {
  if (!settings.instanceUrl || !settings.accessToken) {
    setStatus('err', '設定タブでインスタンスURLとトークンを入力してください');
    return;
  }
  try {
    const res = await fetch(`${settings.instanceUrl}/api/i`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ i: settings.accessToken })
    });
    const data = await res.json();
    if (data.error) throw new Error(data.error.message || data.error.code);
    setStatus('ok', `接続中: @${data.username}@${new URL(settings.instanceUrl).hostname}`);
    if (showToast) toast('接続成功 ✓', 'ok');
  } catch (e) {
    setStatus('err', '接続エラー: ' + e.message);
    if (showToast) toast('接続失敗: ' + e.message, 'err');
  }
}

// ── Post ──────────────────────────────────────────────────────────
async function postNote(patternId) {
  if (!settings.instanceUrl || !settings.accessToken) {
    toast('先に設定タブで設定してください', 'err');
    switchTab('settings');
    return;
  }
  const pattern = patterns.find(p => p.id === patternId);
  if (!pattern || !pattern.variants.length) return;

  const text = pattern.variants[Math.floor(Math.random() * pattern.variants.length)];

  // Visual feedback
  const btn = document.querySelector(`[data-id="${patternId}"]`);
  if (btn) btn.classList.add('posting');

  try {
    const res = await fetch(`${settings.instanceUrl}/api/notes/create`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        i: settings.accessToken,
        text,
        visibility: settings.visibility
      })
    });
    const data = await res.json();
    if (data.error) throw new Error(data.error.message || data.error.code);

    // Show preview
    const preview = document.getElementById('postPreview');
    document.getElementById('postPreviewText').textContent = `「${text}」`;
    preview.classList.add('visible');

    toast(`投稿しました: 「${text}」`, 'ok');
  } catch (e) {
    toast('投稿エラー: ' + e.message, 'err');
  } finally {
    if (btn) {
      setTimeout(() => btn.classList.remove('posting'), 500);
    }
  }
}

// ── Render buttons ────────────────────────────────────────────────
function renderButtons() {
  const grid = document.getElementById('buttonGrid');
  grid.innerHTML = patterns.map(p => `
    <button class="post-btn" data-id="${p.id}" onclick="postNote('${p.id}')">
      <span class="post-btn-emoji">${p.emoji || '💬'}</span>
      <span class="post-btn-name">${escHtml(p.name)}</span>
    </button>
  `).join('');
}

// ── Edit tab ──────────────────────────────────────────────────────
function renderEdit() {
  editBuffer = JSON.parse(JSON.stringify(patterns));
  buildEditUI();
}

function buildEditUI() {
  const sec = document.getElementById('editSection');
  sec.innerHTML = editBuffer.map((p, pi) => `
    <div class="pattern-editor" id="ped-${pi}">
      <div class="pattern-header">
        <input class="pattern-name-input" type="text" value="${escHtml(p.name)}"
          oninput="editBuffer[${pi}].name = this.value" placeholder="ボタン名" />
        <input class="pattern-emoji-input" type="text" value="${escHtml(p.emoji || '')}"
          oninput="editBuffer[${pi}].emoji = this.value" placeholder="絵" maxlength="2" style="background:var(--bg);border:1px solid var(--border);border-radius:7px;font-size:1.3rem;width:3rem;text-align:center;color:var(--text);outline:none;" />
        <button class="remove-pattern-btn" onclick="removePattern(${pi})">削除</button>
      </div>
      <div class="variants-list" id="vlist-${pi}">
        ${p.variants.map((v, vi) => `
          <div class="variant-row" id="vrow-${pi}-${vi}">
            <input type="text" value="${escHtml(v)}"
              oninput="editBuffer[${pi}].variants[${vi}] = this.value"
              placeholder="定型文テキスト" />
            <button class="del-btn" onclick="removeVariant(${pi},${vi})" title="削除">✕</button>
          </div>
        `).join('')}
      </div>
      <button class="add-variant-btn" onclick="addVariant(${pi})">＋ バリアントを追加</button>
    </div>
  `).join('');
}

function addVariant(pi) {
  editBuffer[pi].variants.push('');
  buildEditUI();
}

function removeVariant(pi, vi) {
  editBuffer[pi].variants.splice(vi, 1);
  buildEditUI();
}

function addPattern() {
  if (editBuffer.length === 0) editBuffer = JSON.parse(JSON.stringify(patterns));
  editBuffer.push({
    id: 'pat_' + Date.now(),
    name: '新しいパターン',
    emoji: '💬',
    variants: ['定型文1']
  });
  buildEditUI();
}

function removePattern(pi) {
  editBuffer.splice(pi, 1);
  buildEditUI();
}

function savePatterns() {
  patterns = JSON.parse(JSON.stringify(editBuffer));
  localStorage.setItem('qp_patterns', JSON.stringify(patterns));
  renderButtons();
  toast('保存しました ✓', 'ok');
}

function resetPatterns() {
  if (!confirm('デフォルトのパターンに戻しますか？')) return;
  editBuffer = JSON.parse(JSON.stringify(DEFAULT_PATTERNS));
  buildEditUI();
}

// ── Toast ─────────────────────────────────────────────────────────
let toastTimer;
function toast(msg, type = '') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'show ' + type;
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => { el.className = ''; }, 2800);
}

// ── Util ──────────────────────────────────────────────────────────
function escHtml(s) {
  return String(s)
    .replace(/&/g, '&amp;')
    .replace(/"/g, '&quot;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;');
}
</script>
